<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut · Recarga tu pulsera</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ══════════════════════════════════════════
       RESET & VARIABLES
    ══════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f; --surf:#0d0d1a; --card:#111120; --border:#1c1c2e;
      --a1:#c8ff00; --a2:#ff3cac; --a3:#00d4ff;
      --txt:#e6e6f0; --muted:#60607a;
      --success:#00e676; --danger:#ff1744; --warn:#ffab00;
      --r:16px; --r-sm:12px;
    }
    html,body{
      height:100%; font-family:'DM Sans',sans-serif; font-size:16px;
      color:var(--txt); background:var(--bg);
      overflow:hidden; touch-action:manipulation; user-select:none;
      -webkit-font-smoothing:antialiased;
    }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    .kiosk{
      display:flex; flex-direction:column;
      height:100vh; height:100dvh;
      max-width:580px; margin:0 auto; padding:16px 20px;
      position:relative;
    }

    /* Ambient glow top */
    .kiosk::before{
      content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%);
      width:400px; height:300px;
      background:radial-gradient(ellipse,rgba(200,255,0,.055) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    .k-header{
      text-align:center; padding:14px 0 10px; flex-shrink:0; position:relative; z-index:1;
    }
    .k-logo{
      font-family:'Syne',sans-serif; font-weight:800; font-size:22px; letter-spacing:-.5px;
    }
    .k-logo .hi{color:var(--a1);}
    .k-logo small{
      display:block; font-family:'DM Sans',sans-serif; font-weight:400;
      font-size:10px; color:var(--a3); text-transform:uppercase;
      letter-spacing:2.5px; margin-top:3px;
    }

    .k-body{
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow-y:auto; padding:8px 0 16px;
      position:relative; z-index:1;
    }
    .k-body::-webkit-scrollbar{width:3px;}
    .k-body::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}

    .k-footer{
      text-align:center; padding:8px 0; flex-shrink:0;
      font-size:10px; color:var(--muted); position:relative; z-index:1;
      letter-spacing:.3px;
    }

    /* ══════════════════════════════════════════
       NFC RING
    ══════════════════════════════════════════ */
    .nfc-ring{
      width:180px; height:180px; border-radius:50%;
      border:2.5px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      transition:all .35s cubic-bezier(.4,0,.2,1);
      margin:0 auto; position:relative;
    }
    .nfc-ring::before,.nfc-ring::after{
      content:''; position:absolute; border-radius:50%;
      border:1.5px solid currentColor; opacity:0;
    }
    .nfc-ring::before{width:210px; height:210px;}
    .nfc-ring::after{width:242px; height:242px;}

    .nfc-ring.scanning{
      border-color:var(--a3); color:var(--a3);
      animation:ring-pulse 2.2s ease-in-out infinite;
    }
    .nfc-ring.scanning::before,.nfc-ring.scanning::after{
      animation:ring-expand 2.2s ease-in-out infinite;
    }
    .nfc-ring.scanning::after{animation-delay:.55s;}
    .nfc-ring.found{border-color:var(--a1); color:var(--a1); animation:none;}
    .nfc-ring.found::before,.nfc-ring.found::after{display:none;}
    .nfc-ring.err-ring{border-color:var(--danger); color:var(--danger); animation:none;}

    @keyframes ring-pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.25);}
      50%{box-shadow:0 0 0 20px rgba(0,212,255,0);}
    }
    @keyframes ring-expand{
      0%{opacity:.35; transform:scale(.85);}
      100%{opacity:0; transform:scale(1.12);}
    }

    .nfc-emoji{font-size:64px; line-height:1; display:block; text-align:center;}

    /* ══════════════════════════════════════════
       TYPOGRAPHY HELPERS
    ══════════════════════════════════════════ */
    .k-title{
      font-family:'Syne',sans-serif; font-weight:700; font-size:22px;
      text-align:center; margin-top:20px; line-height:1.2;
    }
    .k-sub{color:var(--muted); font-size:14px; text-align:center; margin-top:7px; line-height:1.5;}

    /* ══════════════════════════════════════════
       BALANCE CARD
    ══════════════════════════════════════════ */
    .bal-card{
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); padding:22px 20px; width:100%; text-align:center;
    }
    .bal-name{font-size:16px; font-weight:500; margin-bottom:3px;}
    .bal-uid{font-size:11px; color:var(--muted); font-family:monospace; letter-spacing:.5px;}
    .bal-amount{
      font-family:'Syne',sans-serif; font-size:52px; font-weight:800;
      color:var(--a1); margin:12px 0 4px; letter-spacing:-1.5px; line-height:1;
    }
    .bal-label{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px;}

    /* ══════════════════════════════════════════
       TOPUP GRID
    ══════════════════════════════════════════ */
    .topup-grid{
      display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:10px; width:100%; margin-top:18px;
    }
    .topup-btn{
      padding:20px 6px; border-radius:var(--r-sm);
      background:var(--card); border:2px solid var(--border);
      text-align:center; cursor:pointer;
      transition:border-color .15s, background .15s, transform .1s;
    }
    .topup-btn:active{transform:scale(.94);}
    .topup-btn.selected{
      border-color:var(--a1);
      background:rgba(200,255,0,.07);
      box-shadow:0 0 0 3px rgba(200,255,0,.12);
    }
    .topup-btn .t-amount{
      font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--a1);
    }
    .topup-btn .t-fee{font-size:10px; color:var(--muted); margin-top:4px;}

    /* ══════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════ */
    .btn{
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:17px 24px; border-radius:var(--r-sm); border:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600;
      transition:opacity .12s, transform .1s; width:100%; min-height:54px;
    }
    .btn:active{transform:scale(.96); opacity:.8;}
    .btn:disabled{opacity:.4; pointer-events:none;}
    .btn-p{background:var(--a1); color:#000;}
    .btn-g{background:transparent; color:var(--muted); border:1px solid var(--border);}
    .btn-danger{background:rgba(255,23,68,.1); color:var(--danger); border:1px solid rgba(255,23,68,.2);}

    /* ══════════════════════════════════════════
       SUMMARY CARD
    ══════════════════════════════════════════ */
    .summary{
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:18px; width:100%; margin-top:14px;
    }
    .sum-row{
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 0; font-size:14px; color:var(--muted);
    }
    .sum-row .val{color:var(--txt);}
    .sum-row.total{
      border-top:1px solid var(--border); padding-top:14px; margin-top:4px;
      font-size:15px; font-weight:600; color:var(--txt);
    }
    .sum-row.total .val{
      color:var(--a1); font-family:'Syne',sans-serif;
      font-size:22px; font-weight:800;
    }

    /* ══════════════════════════════════════════
       PROCESSING
    ══════════════════════════════════════════ */
    .proc-card{
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); padding:28px 20px; width:100%; text-align:center;
    }
    .proc-status{
      padding:13px 16px; background:var(--bg); border:1px solid var(--border);
      border-radius:10px; margin:14px 0; font-size:13px; color:var(--warn);
      line-height:1.5;
    }

    /* ══════════════════════════════════════════
       HISTORY
    ══════════════════════════════════════════ */
    .tx-list{width:100%; display:flex; flex-direction:column; gap:8px; margin-top:12px;}
    .tx-item{
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; background:var(--card);
      border:1px solid var(--border); border-radius:var(--r-sm);
    }
    .tx-icon{
      width:38px; height:38px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .tx-icon.in{background:rgba(200,255,0,.08);}
    .tx-icon.out{background:rgba(255,60,172,.08);}
    .tx-info{flex:1; min-width:0;}
    .tx-concept{font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .tx-date{font-size:11px; color:var(--muted); margin-top:2px;}
    .tx-amount{font-family:'Syne',sans-serif; font-weight:700; font-size:15px; flex-shrink:0;}
    .tx-amount.in{color:var(--a1);}
    .tx-amount.out{color:var(--a2);}

    /* ══════════════════════════════════════════
       SUCCESS OVERLAY
    ══════════════════════════════════════════ */
    .success-overlay{
      position:fixed; inset:0; z-index:500;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,40,10,.93); backdrop-filter:blur(6px);
      animation:fadeIn .25s ease; padding:24px;
    }
    .success-box{text-align:center;}
    .success-emoji{font-size:80px; display:block; margin-bottom:16px;}
    .success-title{font-family:'Syne',sans-serif; font-size:30px; font-weight:800; color:var(--success);}
    .success-sub{font-size:16px; color:var(--muted); margin-top:8px;}
    .success-new{
      font-family:'Syne',sans-serif; font-size:38px; font-weight:800;
      color:var(--a1); margin-top:14px;
    }
    .success-count{font-size:13px; color:var(--muted); margin-top:20px;}

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    #toast{
      position:fixed; bottom:22px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--card); border:1px solid var(--border);
      border-radius:100px; padding:13px 22px;
      font-size:13px; z-index:1000;
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      white-space:nowrap; pointer-events:none;
    }
    #toast.show{transform:translateX(-50%) translateY(0);}
    #toast.warn{border-color:rgba(255,171,0,.35); color:var(--warn);}
    #toast.err{border-color:rgba(255,23,68,.35); color:var(--danger);}
    #toast.ok{border-color:rgba(0,230,118,.35); color:var(--success);}

    /* ══════════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════════ */
    .k-status{
      position:fixed; bottom:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:6px 16px 8px; font-size:10px; color:var(--muted);
      background:linear-gradient(to top,var(--bg) 60%,transparent);
      z-index:10; pointer-events:none;
    }
    .k-status .dot{
      display:inline-block; width:5px; height:5px; border-radius:50%;
      background:var(--a1); margin-right:5px;
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    @media(max-height:680px){
      .nfc-ring{width:140px;height:140px;}
      .nfc-ring::before{width:164px;height:164px;}
      .nfc-ring::after{width:188px;height:188px;}
      .nfc-emoji{font-size:48px;}
      .k-title{font-size:19px;margin-top:14px;}
      .bal-amount{font-size:40px;}
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="kiosk">
  <div class="k-header">
    <div class="k-logo">in<span class="hi">out</span><small>Kiosk · Recarga cashless</small></div>
  </div>
  <div class="k-body" id="k-body"></div>
  <div class="k-footer">InOut Media · Pagos seguros vía SumUp</div>
</div>

<div class="k-status">
  <span><span class="dot"></span>InOut Kiosk v2.0</span>
  <span id="k-time">—</span>
  <span id="k-nfc">NFC: —</span>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════
const SB_URL   = 'https://raoxkjnwrccoxjcipfpv.supabase.co';
const SB_KEY   = 'sb_publishable__-K1pC4bOJHRf8JQ__OOzg_jqLxlGla';
const API_URL  = 'https://inout-api.vercel.app';
const SUMUP_AK = 'sup_afk_Yw5nEDC5oRf34ycz09JFqPkR1DLQR5MH';
const FEE_PCT  = 3.5;
const AMOUNTS  = [5, 10, 20, 30, 50, 100];
const POS_ID   = 'kiosk-01';

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const _sb     = supabase.createClient(SB_URL, SB_KEY);
let nfcReader    = null;
let nfcSupported = false;
let wristband    = null;
let selectedAmt  = 0;
let checkInterval= null;
let idleTimer    = null;

// ════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════
const fmt = n => (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
const calcFee = a => Math.round(a * FEE_PCT) / 100;
const fmtDate = iso => iso
  ? new Date(iso).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
  : '—';

let _toastTimer = null;
function toast(msg, type='', ms=2800){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (type ? ' '+type : '');
  clearTimeout(_toastTimer);
  _toastTimer   = setTimeout(() => t.classList.remove('show'), ms);
}

function resetIdleTimer(){
  clearTimeout(idleTimer);
  const body = document.getElementById('k-body');
  if(!body || body.dataset.screen==='idle') return;
  idleTimer = setTimeout(()=>{
    toast('Sesión reiniciada por inactividad.','warn');
    showIdle();
  }, 120_000);
}

// ════════════════════════════════════════════════════════
//  CLOCK
// ════════════════════════════════════════════════════════
function startClock(){
  const tick = () => {
    const el = document.getElementById('k-time');
    if(el) el.textContent = new Date().toLocaleTimeString('es-ES');
  };
  tick(); setInterval(tick, 1000);
}

// ════════════════════════════════════════════════════════
//  NFC INIT
// ════════════════════════════════════════════════════════
async function initNFC(){
  const el = document.getElementById('k-nfc');
  if(!('NDEFReader' in window)){
    nfcSupported = false;
    if(el) el.textContent = 'NFC: No disponible';
    return;
  }
  nfcSupported = true;
  if(el){ el.textContent='NFC: Activo'; el.style.color='var(--a1)'; }
  try{
    nfcReader = new NDEFReader();
    await nfcReader.scan();
    nfcReader.onreading      = ev => onScan(ev.serialNumber.replace(/:/g,'').toUpperCase());
    nfcReader.onreadingerror = ()  => toast('Error leyendo NFC','err');
  }catch(e){
    nfcSupported = false;
    if(el) el.textContent = 'NFC: Sin permiso';
  }
}

// ════════════════════════════════════════════════════════
//  SCAN HANDLER
// ════════════════════════════════════════════════════════
async function onScan(uid){
  if(navigator.vibrate) navigator.vibrate(100);

  // Evitar scan duplicado si ya vemos este perfil
  const body = document.getElementById('k-body');
  if(body.dataset.screen==='balance' && wristband?.uid===uid) return;

  // Feedback inmediato en el ring (si existe)
  const ring = document.querySelector('.nfc-ring');
  if(ring) ring.className = 'nfc-ring found';

  const {data:wb, error} = await _sb
    .from('rfid_wristbands').select('*').eq('uid',uid).single();

  if(error || !wb){
    if(ring) ring.className = 'nfc-ring err-ring';
    toast('Pulsera no registrada: '+uid,'err');
    setTimeout(()=>showIdle(), 2200);
    return;
  }
  if(wb.status!=='active'){
    if(ring) ring.className = 'nfc-ring err-ring';
    toast('Pulsera bloqueada o inactiva','err');
    setTimeout(()=>showIdle(), 2200);
    return;
  }
  wristband = wb;
  showBalance(wb);
}

// ════════════════════════════════════════════════════════
//  MANUAL UID
// ════════════════════════════════════════════════════════
function manualUID(){
  const body = document.getElementById('k-body');
  body.dataset.screen = 'manual';
  resetIdleTimer();
  body.innerHTML = `
    <div style="width:100%;max-width:380px;text-align:center">
      <div style="font-family:Syne;font-size:20px;font-weight:700;margin-bottom:8px">Introducir UID</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">
        Encuéntralo en el reverso de tu pulsera o en tu ticket.
      </div>
      <input id="uid-in" type="text" autocomplete="off" spellcheck="false"
        placeholder="Ej: A3B21F8C"
        style="
          width:100%; padding:16px 18px; border-radius:var(--r-sm);
          background:var(--surf); border:2px solid var(--border);
          color:var(--txt); font-size:20px; text-align:center;
          font-family:monospace; letter-spacing:3px; outline:none;
          -webkit-text-fill-color:var(--txt);
          transition:border-color .15s;
        "
        oninput="this.value=this.value.replace(/[^a-fA-F0-9 :]/g,'').toUpperCase()"
        onkeydown="if(event.key==='Enter')submitManualUID()"
      />
      <button class="btn btn-p" style="margin-top:14px" onclick="submitManualUID()">
        Verificar pulsera
      </button>
      <button class="btn btn-g" style="margin-top:8px" onclick="showIdle()">
        ← Volver
      </button>
    </div>
  `;
  setTimeout(()=>document.getElementById('uid-in')?.focus(), 80);
}

function submitManualUID(){
  const raw = (document.getElementById('uid-in')?.value||'').trim();
  const uid = raw.replace(/[^a-fA-F0-9]/g,'').toUpperCase();
  if(uid.length < 4){ toast('Introduce un UID válido.','warn'); return; }
  onScan(uid);
}

// ════════════════════════════════════════════════════════
//  SCREEN 1 — IDLE
// ════════════════════════════════════════════════════════
function showIdle(){
  wristband = null; selectedAmt = 0;
  clearInterval(checkInterval); checkInterval = null;
  clearTimeout(idleTimer);

  const body = document.getElementById('k-body');
  body.dataset.screen = 'idle';
  body.innerHTML = `
    <div class="nfc-ring scanning">
      <span class="nfc-emoji">👋</span>
    </div>
    <div class="k-title">Acerca tu pulsera</div>
    <div class="k-sub">Para consultar tu saldo o recargar.</div>
    <div style="width:100%;max-width:360px;margin-top:28px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-g" onclick="manualUID()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Introducir UID manualmente
      </button>
      <button class="btn btn-g" style="font-size:13px;min-height:44px;padding:12px" onclick="consultarSaldo()">
        Consultar saldo sin recargar →
      </button>
    </div>
    ${!nfcSupported
      ? '<div style="margin-top:18px;font-size:12px;color:var(--muted);text-align:center">NFC no disponible en este dispositivo.<br>Usa el UID manual.</div>'
      : ''}
  `;
}

// ════════════════════════════════════════════════════════
//  CONSULTAR SALDO (sin recargar)
//  — si hay NFC, avisa que acerque la pulsera (ya escucha)
//  — si no hay NFC, va a introducir UID
// ════════════════════════════════════════════════════════
function consultarSaldo(){
  if(nfcSupported){
    toast('Acerca tu pulsera para ver el saldo.','', 3500);
  } else {
    manualUID();
  }
}

// ════════════════════════════════════════════════════════
//  SCREEN 2 — BALANCE + selección de importe
// ════════════════════════════════════════════════════════
function showBalance(wb){
  selectedAmt = 0;
  const body = document.getElementById('k-body');
  body.dataset.screen = 'balance';
  resetIdleTimer();

  body.innerHTML = `
    <div class="bal-card">
      <div class="bal-name">${wb.holder_name || '— Sin nombre —'}</div>
      <div class="bal-uid">${wb.uid}</div>
      <div class="bal-amount">${fmt(wb.balance)}<span style="font-size:24px;font-weight:400;color:rgba(200,255,0,.5)"> €</span></div>
      <div class="bal-label">Saldo disponible</div>
    </div>

    <div style="font-family:Syne;font-weight:700;font-size:17px;margin-top:22px;align-self:flex-start">
      ¿Cuánto quieres recargar?
    </div>
    <div class="topup-grid">
      ${AMOUNTS.map(a=>`
        <div class="topup-btn" id="tb-${a}" onclick="selectAmount(${a})">
          <div class="t-amount">${a}€</div>
          <div class="t-fee">Pagas ${fmt(a+calcFee(a))}€</div>
        </div>
      `).join('')}
    </div>

    <div style="width:100%;margin-top:16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-p" id="pay-btn" onclick="showSummary()" disabled>
        Selecciona un importe
      </button>
      <button class="btn btn-g" style="font-size:13px;min-height:44px;padding:12px" onclick="showHistory()">
        Ver historial de movimientos
      </button>
      <button class="btn btn-g" style="font-size:13px;min-height:44px;padding:12px" onclick="showIdle()">
        ← Inicio
      </button>
    </div>
  `;
}

function selectAmount(a){
  selectedAmt = a;
  document.querySelectorAll('.topup-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('tb-'+a)?.classList.add('selected');
  const btn   = document.getElementById('pay-btn');
  const total = a + calcFee(a);
  btn.disabled = false;
  btn.innerHTML = `Pagar <strong style="font-family:Syne;font-size:18px">${fmt(total)} €</strong>&nbsp;·&nbsp;Recargar ${a} €`;
}

// ════════════════════════════════════════════════════════
//  SCREEN 3 — RESUMEN
// ════════════════════════════════════════════════════════
function showSummary(){
  if(!selectedAmt || !wristband) return;
  const fee   = calcFee(selectedAmt);
  const total = selectedAmt + fee;
  const body  = document.getElementById('k-body');
  body.dataset.screen = 'summary';
  resetIdleTimer();

  body.innerHTML = `
    <div style="font-family:Syne;font-size:20px;font-weight:700;text-align:center;width:100%">
      Resumen del pago
    </div>

    <div class="summary">
      <div class="sum-row">
        <span>Pulsera</span>
        <span class="val" style="font-family:monospace;font-size:12px">${wristband.uid}</span>
      </div>
      <div class="sum-row">
        <span>Titular</span>
        <span class="val">${wristband.holder_name||'—'}</span>
      </div>
      <div class="sum-row">
        <span>Recarga</span>
        <span class="val">${fmt(selectedAmt)} €</span>
      </div>
      <div class="sum-row">
        <span>Comisión (${FEE_PCT}%)</span>
        <span class="val" style="color:var(--muted)">${fmt(fee)} €</span>
      </div>
      <div class="sum-row total">
        <span>Total a pagar</span>
        <span class="val">${fmt(total)} €</span>
      </div>
    </div>

    <div style="width:100%;margin-top:16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-p" onclick="startPayment()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/>
        </svg>
        Confirmar y pagar con tarjeta
      </button>
      <button class="btn btn-g" onclick="showBalance(wristband)">← Cambiar importe</button>
      <button class="btn btn-g" style="font-size:13px;min-height:44px;padding:12px" onclick="showIdle()">Cancelar</button>
    </div>
  `;
}

// ════════════════════════════════════════════════════════
//  SCREEN 4 — PAGO → SumUp
// ════════════════════════════════════════════════════════
async function startPayment(){
  if(!wristband || selectedAmt<=0) return;

  // Feedback inmediato — deshabilitar botón
  const confBtn = document.querySelector('#k-body .btn-p');
  if(confBtn){ confBtn.disabled=true; confBtn.textContent='Procesando…'; }

  try{
    const res  = await fetch(API_URL+'/api/rfid/topup',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        wristband_id: wristband.id,
        uid:          wristband.uid,
        amount:       selectedAmt,
        event_id:     wristband.event_id,
        operator:     'Kiosco autoservicio '+POS_ID,
        return_origin:'https://inout-kiosk.vercel.app',
      })
    });
    const data = await res.json();

    if(data.error){ toast('Error: '+data.error,'err'); showSummary(); return; }

    // Guardar para sobrevivir redirección Android
    sessionStorage.setItem('k_sumup_id', data.sumup_checkout_id||'');
    sessionStorage.setItem('k_wb_id',    wristband.id);
    sessionStorage.setItem('k_amount',   String(selectedAmt));
    sessionStorage.setItem('k_ref',      data.reference||'');

    showProcessing();

    // Android → deep link datáfono SumUp Solo
    if(/Android/i.test(navigator.userAgent) && data.reference){
      const total = +(selectedAmt + calcFee(selectedAmt)).toFixed(2);
      window.location.href = 'sumupmerchant://pay/1.0'
        +'?affiliate-key='+SUMUP_AK
        +'&app-id=com.inoutmedia.valid'
        +'&total='+total
        +'&currency=EUR'
        +'&title='+encodeURIComponent('Recarga '+(wristband.holder_name||wristband.uid))
        +'&foreign-tx-id='+data.reference
        +'&skip-screen-success=true'
        +'&callback='+encodeURIComponent('https://inout-kiosk.vercel.app');
    } else if(data.checkout_url){
      window.open(data.checkout_url,'_blank','noopener');
    }

    // Polling cada 5s
    checkInterval = setInterval(checkPayment, 5000);

  }catch(err){
    console.error(err);
    toast('Error de conexión. Inténtalo de nuevo.','err');
    showSummary();
  }
}

// ════════════════════════════════════════════════════════
//  SCREEN 5 — PROCESANDO
// ════════════════════════════════════════════════════════
function showProcessing(){
  const fee   = calcFee(selectedAmt);
  const total = selectedAmt + fee;
  const body  = document.getElementById('k-body');
  body.dataset.screen = 'processing';
  resetIdleTimer();

  body.innerHTML = `
    <div class="proc-card">
      <div style="font-size:52px;margin-bottom:10px">💳</div>
      <div style="font-family:Syne;font-size:20px;font-weight:700">Completa el pago</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">${wristband.holder_name||wristband.uid}</div>
      <div style="font-family:Syne;font-size:46px;font-weight:800;color:var(--a1);margin:14px 0;letter-spacing:-1px">${fmt(total)} €</div>

      <div class="summary" style="text-align:left;margin-top:0">
        <div class="sum-row"><span>Recarga saldo</span><span class="val">${fmt(selectedAmt)} €</span></div>
        <div class="sum-row"><span>Comisión (${FEE_PCT}%)</span><span class="val" style="color:var(--muted)">${fmt(fee)} €</span></div>
        <div class="sum-row total"><span>Total a pagar</span><span class="val">${fmt(total)} €</span></div>
      </div>

      <div class="proc-status" id="k-status">⏳ Esperando confirmación…</div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <button class="btn btn-g" style="font-size:14px;padding:14px" onclick="checkPayment()">
          🔄 Verificar ahora
        </button>
        <button class="btn btn-danger" onclick="cancelPayment()">Cancelar pago</button>
      </div>
    </div>
  `;
}

async function checkPayment(){
  const sumupId = sessionStorage.getItem('k_sumup_id');
  const wbId    = sessionStorage.getItem('k_wb_id');
  const amount  = sessionStorage.getItem('k_amount');
  const ref     = sessionStorage.getItem('k_ref');
  if(!wbId) return;

  const el = document.getElementById('k-status');
  if(el) el.innerHTML = '🔄 Verificando…';

  try{
    const res  = await fetch(`${API_URL}/api/rfid/verify-topup?wristband=${wbId}&amount=${amount}&ref=${ref}&sumup_id=${sumupId}`);
    const data = await res.json();

    if(data.status==='completed'||data.status==='already_completed'){
      clearInterval(checkInterval); checkInterval = null;
      clearSession();
      showSuccess(parseFloat(amount), data.balance, data.holder_name);
    } else {
      if(el) el.innerHTML = `⏳ Pago pendiente — <em>${data.sumup_status||'procesando'}</em><br>
        <span style="font-size:11px;color:var(--muted)">Se verifica automáticamente cada 5 seg.</span>`;
    }
  }catch(e){
    if(el) el.textContent = '⚠️ Error al verificar. Reintenta.';
  }
}

function cancelPayment(){
  clearInterval(checkInterval); checkInterval = null;
  clearSession();
  toast('Recarga cancelada.','warn');
  showIdle();
}

function clearSession(){
  ['k_sumup_id','k_wb_id','k_amount','k_ref'].forEach(k=>sessionStorage.removeItem(k));
}

// ════════════════════════════════════════════════════════
//  SCREEN 6 — ÉXITO
// ════════════════════════════════════════════════════════
function showSuccess(amount, newBalance, name){
  if(navigator.vibrate) navigator.vibrate([100,60,100]);

  const overlay = document.createElement('div');
  overlay.className = 'success-overlay';
  overlay.innerHTML = `
    <div class="success-box">
      <span class="success-emoji">✅</span>
      <div class="success-title">¡Recarga completada!</div>
      <div class="success-new">+${fmt(amount)} €</div>
      <div class="success-sub">
        Nuevo saldo: <strong style="color:var(--a1);font-family:Syne">${fmt(newBalance)} €</strong>
      </div>
      ${name ? `<div style="font-size:13px;color:var(--muted);margin-top:6px">${name}</div>` : ''}
      <div class="success-count" id="scd">Volviendo al inicio en 5 seg…</div>
      <button class="btn btn-p" style="margin-top:22px;max-width:280px"
        onclick="this.closest('.success-overlay').remove();showIdle()">
        Volver ahora
      </button>
    </div>
  `;
  document.body.appendChild(overlay);

  let secs = 5;
  const ticker = setInterval(()=>{
    secs--;
    const el = document.getElementById('scd');
    if(el) el.textContent = `Volviendo al inicio en ${secs} seg…`;
    if(secs<=0){ clearInterval(ticker); overlay.remove(); showIdle(); }
  }, 1000);
}

// ════════════════════════════════════════════════════════
//  SCREEN 7 — HISTORIAL
// ════════════════════════════════════════════════════════
async function showHistory(){
  if(!wristband) return;
  const body = document.getElementById('k-body');
  body.dataset.screen = 'history';
  resetIdleTimer();

  body.innerHTML = `
    <div style="width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-family:Syne;font-weight:700;font-size:18px">Historial</div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Saldo actual</div>
        <div style="font-family:Syne;font-weight:800;font-size:20px;color:var(--a1)">${fmt(wristband.balance)} €</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-family:monospace">${wristband.uid}</div>
    <div id="tx-list" class="tx-list">
      <div style="text-align:center;color:var(--muted);font-size:14px;padding:28px">Cargando…</div>
    </div>
    <button class="btn btn-g" style="margin-top:12px;font-size:13px;min-height:44px;padding:12px"
      onclick="showBalance(wristband)">
      ← Volver al perfil
    </button>
  `;

  try{
    const {data:txs} = await _sb
      .from('rfid_transactions')
      .select('*')
      .eq('wristband_id', wristband.id)
      .order('created_at',{ascending:false})
      .limit(30);

    const list = document.getElementById('tx-list');
    if(!list) return;

    if(!txs||txs.length===0){
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:14px;padding:28px">Sin movimientos registrados.</div>';
      return;
    }

    list.innerHTML = txs.map(tx=>{
      const isIn = tx.amount > 0;
      return `
        <div class="tx-item">
          <div class="tx-icon ${isIn?'in':'out'}">${isIn?'⬆️':'⬇️'}</div>
          <div class="tx-info">
            <div class="tx-concept">${tx.description||(isIn?'Recarga cashless':'Consumo')}</div>
            <div class="tx-date">${fmtDate(tx.created_at)}</div>
          </div>
          <div class="tx-amount ${isIn?'in':'out'}">${isIn?'+':''}${fmt(tx.amount)} €</div>
        </div>
      `;
    }).join('');

  }catch(e){
    const list = document.getElementById('tx-list');
    if(list) list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:14px;padding:28px">Error al cargar movimientos.</div>';
  }
}

// ════════════════════════════════════════════════════════
//  RESUME tras deep link Android
// ════════════════════════════════════════════════════════
async function checkResume(){
  const wbId   = sessionStorage.getItem('k_wb_id');
  const amount = sessionStorage.getItem('k_amount');
  if(!wbId||!amount) return false;

  const {data:wb} = await _sb.from('rfid_wristbands').select('*').eq('id',wbId).single();
  if(!wb){ clearSession(); return false; }

  wristband   = wb;
  selectedAmt = parseFloat(amount);
  showProcessing();
  checkInterval = setInterval(checkPayment, 5000);
  return true;
}

// ════════════════════════════════════════════════════════
//  TRAZABILIDAD — logs, informe diario, backup
// ════════════════════════════════════════════════════════
function logEvent(event, data={}){
  const entry = {ts:new Date().toISOString(), pos:POS_ID, event, ...data};
  const logs  = JSON.parse(sessionStorage.getItem('kiosk_logs')||'[]');
  logs.push(entry);
  if(logs.length>300) logs.shift();
  sessionStorage.setItem('kiosk_logs', JSON.stringify(logs));
  fetch(API_URL+'/api/rfid/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}).catch(()=>{});
}

function scheduleDailyReport(){
  const now    = new Date();
  const target = new Date(now); target.setHours(23,59,0,0);
  if(now>=target) target.setDate(target.getDate()+1);
  setTimeout(function run(){
    const today = new Date().toISOString().split('T')[0];
    const logs  = JSON.parse(sessionStorage.getItem('kiosk_logs')||'[]');
    const tl    = logs.filter(l=>l.ts.startsWith(today));
    fetch(API_URL+'/api/rfid/daily-report',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        pos_id:POS_ID, date:today, logs:tl,
        total_topups:tl.filter(l=>l.event==='payment_success').length,
        total_amount:tl.filter(l=>l.event==='payment_success').reduce((s,l)=>s+(l.amount||0),0)
      })
    }).catch(()=>{});
    setTimeout(run, 24*60*60*1000);
  }, target-now);
}

function scheduleBackup(){
  setInterval(()=>{
    const logs = JSON.parse(sessionStorage.getItem('kiosk_logs')||'[]');
    fetch(API_URL+'/api/rfid/backup',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pos_id:POS_ID, ts:new Date().toISOString(), logs})
    }).catch(()=>{});
  }, 15*60*1000);
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
(async function init(){
  startClock();
  scheduleDailyReport();
  scheduleBackup();
  await initNFC();

  document.addEventListener('touchstart', resetIdleTimer, {passive:true});
  document.addEventListener('click', resetIdleTimer);

  const resumed = await checkResume();
  if(!resumed) showIdle();
})();
</script>
